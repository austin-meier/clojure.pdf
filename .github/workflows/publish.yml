name: publish

# Tag a release (e.g. `git tag v0.42 && git push --tags`) to publish the
# Clojars jar and the npm package. Both jobs run only on version tags.
on:
  push:
    tags:
      - "v*"

jobs:
  clojars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: cljdeps-${{ hashFiles('deps.edn') }}
          restore-keys: cljdeps-

      - run: clojure -X:test

      - name: Deploy to Clojars
        run: |
          export VERSION="${GITHUB_REF_NAME#v}" # v0.1.0 -> 0.1.0
          clojure -T:build deploy
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          # deps-deploy reads the token from an env var hardcoded as
          # CLOJARS_PASSWORD; the repo secret itself is named CLOJARS_TOKEN.
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_TOKEN }}

  npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esm
    steps:
      - uses: actions/checkout@v4

      # shadow-cljs compiles on the JVM, so the npm build needs Java too
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Stamp version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
